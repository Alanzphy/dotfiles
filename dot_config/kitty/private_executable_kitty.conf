#Version 3.0.2
#font_family      JetBrainsMono Nerd Font Bold
#bold_font        JetBrainsMono Nerd Font Bold
#italic_font      JetBrainsMono Nerd Font Italic
#bold_italic_font JetBrainsMono Nerd Font BoldItalic
font_family      JetBrains Mono Bold
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Bold Italic
bold_italic_font JetBrains Mono Bold Italic

#font_family      LigaSFMonoNerdFont-SemiBold
#bold_font        LigaSFMonoNerdFont-SemiBold
#italic_font      LigaSFMonoNerdFont-Italic
#bold_italic_font LigaSFMonoNerdFont-SemiBoldItalic


cursor_trail 10
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 0
force_ltr no
font_size 15.5
#window_border_width 0.5pt
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
copy_on_select no
strip_trailing_spaces never
select_by_word_characters @-./_~?&=%+#
sync_to_monitor yes
enable_audio_bell no
hide_window_decorations titlebar-only
background_opacity 0.85
background_blur 10
remember_window_size no
initial_window_width 93c
initial_window_height 24c
window_padding_width 5 12

tab_bar_min_tabs            2
tab_bar_edge                top
tab_bar_style               fade
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
#modify_font cell_width 100%
modify_font cell_height -5px


# The basic colors
#foreground              #b6a0ff
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color background

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

map ctrl+shift+z kitten zoom_toggle.py
map ctrl+q close_window
